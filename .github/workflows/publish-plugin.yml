name: Deploy Plugin Marketplace

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: plugin-marketplace-deploy
  cancel-in-progress: false

jobs:
  verify:
    if: github.repository == 'medeiroshudson/CodexAgent'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out main source
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && 'refs/heads/main' || github.sha }}
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Test workspace
        run: npm test

      - name: Validate workspace and plugin marketplace
        run: npm run validate

  deploy:
    needs: verify
    if: github.repository == 'medeiroshudson/CodexAgent'
    runs-on: ubuntu-latest
    environment:
      name: codex-marketplace
      url: https://github.com/${{ github.repository }}/tree/marketplace
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Check out verified main source
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && 'refs/heads/main' || github.sha }}
          fetch-depth: 0

      - name: Deploy verified commit to marketplace branch
        shell: bash
        run: git push origin "HEAD:refs/heads/marketplace"

      - name: Record deployment summary
        shell: bash
        run: |
          {
            echo "### Codex marketplace deployed"
            echo
            echo "- Source: \`main\`"
            echo "- Destination: \`marketplace\`"
            echo "- Commit: \`$GITHUB_SHA\`"
          } >> "$GITHUB_STEP_SUMMARY"
