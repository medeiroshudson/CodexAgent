name: Publish Plugin Marketplace

on:
  push:
    tags:
      - "plugin-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing plugin-v tag to publish
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: plugin-marketplace-publish
  cancel-in-progress: false

jobs:
  verify:
    if: github.repository == 'medeiroshudson/CodexAgent'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out release source
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Verify plugin release tag
        run: node scripts/check-plugin-release.mjs
        env:
          PLUGIN_RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

      - name: Test workspace
        run: npm test

      - name: Validate workspace and plugin marketplace
        run: npm run validate

  release:
    needs: verify
    if: github.repository == 'medeiroshudson/CodexAgent'
    runs-on: ubuntu-latest
    environment: codex-marketplace
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Check out verified source
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.ref }}

      - name: Build release archive
        id: package
        shell: bash
        run: |
          set -euo pipefail
          VERSION=$(node -p "require('./plugins/codex-agent/.codex-plugin/plugin.json').version")
          ASSET_NAME="codex-agent-marketplace-$VERSION.tar.gz"
          mkdir -p release
          git archive \
            --format=tar.gz \
            --prefix="codex-agent-marketplace-$VERSION/" \
            --output="release/$ASSET_NAME" \
            HEAD \
            .agents/plugins/marketplace.json \
            plugins/codex-agent \
            README.md \
            LICENSE
          sha256sum "release/$ASSET_NAME" > "release/$ASSET_NAME.sha256"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "asset=release/$ASSET_NAME" >> "$GITHUB_OUTPUT"
          echo "checksum=release/$ASSET_NAME.sha256" >> "$GITHUB_OUTPUT"

      - name: Check for an existing release
        id: existing
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Release $RELEASE_TAG already exists; skipping publication."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish GitHub release
        if: steps.existing.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          VERSION: ${{ steps.package.outputs.version }}
          ASSET: ${{ steps.package.outputs.asset }}
          CHECKSUM: ${{ steps.package.outputs.checksum }}
        run: >-
          gh release create "$RELEASE_TAG"
          "$ASSET#Codex marketplace bundle"
          "$CHECKSUM#SHA-256 checksum"
          --verify-tag
          --title "Codex Agent $VERSION"
          --generate-notes
