name: Publish CLI

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  publish:
    if: github.repository == 'medeiroshudson/CodexAgent'
    runs-on: ubuntu-latest
    environment: npm
    timeout-minutes: 10
    steps:
      - name: Check out main commit
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Build CLI package
        run: npm run build --workspace @codex-agent/cli

      - name: Test workspace
        run: npm test

      - name: Validate workspace
        run: npm run validate

      - name: Derive commit version
        id: version
        shell: bash
        run: |
          VERSION=$(node scripts/derive-cli-version.mjs)
          npm version "$VERSION" --workspace @codex-agent/cli --no-git-tag-version --allow-same-version
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Publish commit as latest
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [[ -z "$NODE_AUTH_TOKEN" ]]; then
            echo "::error::NPM_TOKEN is not configured in the npm GitHub environment."
            exit 1
          fi
          npm whoami
          npm publish --workspace @codex-agent/cli --access public --tag latest
          echo "Published @codex-agent/cli@${{ steps.version.outputs.value }} from ${GITHUB_SHA}." >> "$GITHUB_STEP_SUMMARY"
