name: Publish CLI

on:
  push:
    tags:
      - "cli-v*"

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    if: github.repository == 'medeiroshudson/CodexAgent'
    runs-on: ubuntu-latest
    environment: npm
    timeout-minutes: 10
    steps:
      - name: Check out release tag
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Verify release tag
        run: node scripts/check-cli-release.mjs
        env:
          CLI_RELEASE_TAG: ${{ github.ref_name }}

      - name: Build CLI package
        run: npm run build --workspace @codex-agent/cli

      - name: Test workspace
        run: npm test

      - name: Validate workspace
        run: npm run validate

      - name: Publish public package with OIDC
        run: npm publish --workspace @codex-agent/cli --access public
