name: Bootstrap CLI package

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: Type @codex-agent/cli@<version> to confirm the first publish
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: npm-publish-cli
  cancel-in-progress: false

jobs:
  bootstrap:
    if: github.repository == 'medeiroshudson/CodexAgent'
    runs-on: ubuntu-latest
    environment: npm
    timeout-minutes: 10
    steps:
      - name: Check out selected ref
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Verify publish confirmation
        shell: bash
        env:
          CONFIRMATION: ${{ inputs.confirmation }}
        run: |
          VERSION=$(node -p "require('./packages/codex-agent-cli/package.json').version")
          EXPECTED="@codex-agent/cli@$VERSION"
          if [[ "$CONFIRMATION" != "$EXPECTED" ]]; then
            echo "::error::Confirmation must exactly match $EXPECTED."
            exit 1
          fi

      - name: Verify npm token
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [[ -z "$NODE_AUTH_TOKEN" ]]; then
            echo "::error::NPM_TOKEN is not configured in the npm GitHub environment."
            exit 1
          fi
          npm whoami

      - name: Install dependencies
        run: npm ci

      - name: Build CLI package
        run: npm run build --workspace @codex-agent/cli

      - name: Test workspace
        run: npm test

      - name: Validate workspace
        run: npm run validate

      - name: Publish first public version with npm token
        run: npm publish --workspace @codex-agent/cli --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
